name: fwmap-main-history

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *" # JST 03:17

permissions:
  contents: write

concurrency:
  group: fwmap-main-history
  cancel-in-progress: false

env:
  FWMAP_OUT_DIR: out
  FWMAP_SITE_DIR: site
  FWMAP_HISTORY_DB: out/history/history.db
  FWMAP_MAP_PATH: ${{ github.workspace }}/target/release/fwmap.map
  FWMAP_HISTORY_BRANCH: fwmap-history-data

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build fwmap
        env:
          CARGO_PROFILE_RELEASE_DEBUG: 1
          RUSTFLAGS: -C link-arg=-Wl,-Map=${{ env.FWMAP_MAP_PATH }}
        run: |
          mkdir -p build
          cargo metadata --format-version=1 > build/cargo-metadata.json
          cargo build --release --message-format=json > build/cargo-build.jsonl
          mkdir -p bin build "$FWMAP_OUT_DIR/history" "$FWMAP_SITE_DIR"
          cp target/release/fwmap bin/fwmap
          cp target/release/fwmap build/fwmap.elf
          cp "${FWMAP_MAP_PATH}" build/fwmap.map

      - name: Restore persisted history database
        run: |
          mkdir -p history-state
          if git ls-remote --exit-code --heads origin "$FWMAP_HISTORY_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$FWMAP_HISTORY_BRANCH"
            git worktree add history-state "origin/$FWMAP_HISTORY_BRANCH"
            if [ -f "history-state/history.db" ]; then
              cp "history-state/history.db" "$FWMAP_HISTORY_DB"
            fi
          else
            git worktree add --detach history-state
            (
              cd history-state
              git checkout --orphan "$FWMAP_HISTORY_BRANCH"
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi
          mkdir -p prev
          if [ -f "history-state/latest/fwmap.elf" ] && [ -f "history-state/latest/fwmap.map" ]; then
            cp "history-state/latest/fwmap.elf" prev/fwmap-prev.elf
            cp "history-state/latest/fwmap.map" prev/fwmap-prev.map
          fi

      - name: Run fwmap analyze and save history
        run: |
          ANALYZE_ARGS=(
            --cargo-build-json build/cargo-build.jsonl
            --cargo-metadata build/cargo-metadata.json
            --cargo-package fwmap
            --cargo-target-name fwmap
            --cargo-target-kind bin
            --cargo-target-triple x86_64-unknown-linux-gnu
            --resolve-rust-artifact strict
            --map build/fwmap.map
            --dwarf=on
            --source-lines lines
            --out "$FWMAP_OUT_DIR/report.html"
            --report-json "$FWMAP_OUT_DIR/report.json"
            --sarif "$FWMAP_OUT_DIR/fwmap.sarif"
            --save-history
            --history-db "$FWMAP_HISTORY_DB"
            --git-repo .
            --profile release
          )
          if [ -f prev/fwmap-prev.elf ] && [ -f prev/fwmap-prev.map ]; then
            ANALYZE_ARGS+=(--prev-elf prev/fwmap-prev.elf --prev-map prev/fwmap-prev.map)
          fi
          ./bin/fwmap analyze "${ANALYZE_ARGS[@]}"

      - name: Render history pages
        run: |
          BASE="$(git rev-list --max-count=21 HEAD | tail -n 1)"
          ./bin/fwmap history commits \
            --db "$FWMAP_HISTORY_DB" \
            --repo . \
            --limit 100 \
            --order ancestry \
            --html "$FWMAP_SITE_DIR/history-commits.html"
          ./bin/fwmap history range "${BASE}..HEAD" \
            --db "$FWMAP_HISTORY_DB" \
            --repo . \
            --order ancestry \
            --include-changed-files \
            --html "$FWMAP_SITE_DIR/history-range.html"
          ./bin/fwmap history regression \
            --db "$FWMAP_HISTORY_DB" \
            --repo . \
            "${BASE}..HEAD" \
            --metric rom_total \
            --threshold +1 \
            --include-evidence \
            --html "$FWMAP_SITE_DIR/regression-rom.html"
          cp "$FWMAP_OUT_DIR/report.html" "$FWMAP_SITE_DIR/report.html"
          cp "$FWMAP_OUT_DIR/report.json" "$FWMAP_SITE_DIR/report.json"
          cp "$FWMAP_OUT_DIR/fwmap.sarif" "$FWMAP_SITE_DIR/fwmap.sarif"
          printf '%s\n' \
            '<!doctype html>' \
            '<html><head><meta charset="utf-8"><title>fwmap history</title></head><body>' \
            '<h1>fwmap history</h1>' \
            '<ul>' \
            '<li><a href="report.html">Latest report</a></li>' \
            '<li><a href="history-commits.html">Commit timeline</a></li>' \
            '<li><a href="history-range.html">Range diff</a></li>' \
            '<li><a href="regression-rom.html">ROM regression origin</a></li>' \
            '</ul>' \
            '</body></html>' \
            > "$FWMAP_SITE_DIR/index.html"

      - name: Persist history database
        if: github.ref == 'refs/heads/main'
        run: |
          cp "$FWMAP_HISTORY_DB" "history-state/history.db"
          mkdir -p "history-state/site"
          mkdir -p "history-state/latest"
          cp build/fwmap.elf "history-state/latest/fwmap.elf"
          cp build/fwmap.map "history-state/latest/fwmap.map"
          cp -r "$FWMAP_SITE_DIR"/. "history-state/site/"
          (
            cd history-state
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add history.db site latest
            git commit -m "Update fwmap history for ${GITHUB_SHA}" || true
            git push origin "HEAD:$FWMAP_HISTORY_BRANCH"
          )

      - name: Write job summary
        run: |
          echo "## fwmap main history" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: \`${GITHUB_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- report json: \`${FWMAP_OUT_DIR}/report.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- report html: \`${FWMAP_OUT_DIR}/report.html\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- sarif: \`${FWMAP_OUT_DIR}/fwmap.sarif\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- history db: \`${FWMAP_HISTORY_DB}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- site dir: \`${FWMAP_SITE_DIR}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fwmap-main-history-${{ github.sha }}
          path: |
            out/
            site/
          retention-days: 30

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: build-and-analyze
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v5
        with:
          name: fwmap-main-history-${{ github.sha }}
          path: artifact

      - name: Prepare Pages payload
        run: |
          mkdir -p pages
          cp -r artifact/site/* pages/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
