<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>fwmap マニュアル</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #5b6472;
      --line: #d8dee8;
      --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
      line-height: 1.75;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero {
      margin-bottom: 20px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 42px;
      line-height: 1.15;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
    }
    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 250, 252, 0.9);
    }
    .panel-header strong {
      font-size: 18px;
    }
    .panel-header a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    pre {
      margin: 0;
      padding: 24px 22px 28px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Consolas", "SFMono-Regular", monospace;
      font-size: 14px;
      line-height: 1.75;
    }
    .error {
      color: #b42318;
    }
    @media (max-width: 720px) {
      main { padding: 20px 14px 36px; }
      .hero h1 { font-size: 32px; }
      .panel-header { padding: 16px 18px; }
      pre { padding: 18px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>fwmap マニュアル</h1>
      <p>本文は <code>manual.md</code> をそのまま UTF-8 で表示します。ブラウザ上で手早く内容を確認したいときに使ってください。</p>
    </section>
    <section class="panel">
      <div class="panel-header">
        <strong>docs/manual.md</strong>
        <a href="./manual.md">Markdown を開く</a>
      </div>
      <pre id="manual">読み込み中...</pre>
    </section>
  </main>
  <script>
    (async function () {
      const target = document.getElementById("manual");
      try {
        const response = await fetch("./manual.md", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("manual.md の読み込みに失敗しました");
        }
        target.textContent = await response.text();
      } catch (error) {
        target.textContent = String(error);
        target.classList.add("error");
      }
    }());
  </script>
</body>
</html>
